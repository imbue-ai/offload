name: Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Reference of mngr to test against. Pinned to a commit where tests are expected to mostly pass.
  MNGR_REF: "f0fa20ebbd1dbd863ff996cdc83f6840d86ebc1e"

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout offload
      uses: actions/checkout@v6
      with:
        path: offload

    - name: Checkout mngr
      uses: actions/checkout@v6
      with:
        repository: imbue-ai/mngr
        ref: ${{ env.MNGR_REF }}
        token: ${{ secrets.MNGR_ACCESS_TOKEN }}
        path: mngr
        fetch-depth: 0

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Install just
      uses: taiki-e/install-action@v2
      with:
        tool: just

    - name: Install uv (Python package manager)
      uses: astral-sh/setup-uv@v7

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: offload

    - name: Install offload (current version)
      working-directory: offload
      run: just install

    - name: Install mngr dependencies
      working-directory: mngr
      run: |
        uv venv .venv --clear
        uv sync --all-packages
        uv tool install -e libs/mngr

    - name: Run integration test
      working-directory: mngr
      env:
        MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
        MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      run: |
        source .venv/bin/activate
        OUTPUT=$(LAST_COMMIT_SHA=${{ env.MNGR_REF }} just test-offload 2>&1 || true)
        echo "$OUTPUT"

        # Check that "passed" appears in output
        if ! echo "$OUTPUT" | grep -q "passed"; then
          echo "FAIL: output does not contain 'passed'"
          exit 1
        fi

        # Check that "failed" appears followed by a number < 10
        FAILED_COUNT=$(echo "$OUTPUT" | grep -oE 'failed[: ]*[0-9]+' | grep -oE '[0-9]+' | tail -1)
        if [ -z "$FAILED_COUNT" ]; then
          echo "FAIL: output does not contain 'failed' with a count"
          exit 1
        fi
        if [ "$FAILED_COUNT" -ge 10 ]; then
          echo "FAIL: failed count is $FAILED_COUNT (must be < 10)"
          exit 1
        fi
        echo "PASS: found 'passed' and failed count is $FAILED_COUNT (< 10)"
