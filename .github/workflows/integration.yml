name: Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Branch of mng to test against, was main
  MNG_REF: "a734bfb013638893fe73d2f96498d4bc723a1127"

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout offload
      uses: actions/checkout@v4
      with:
        path: offload

    - name: Checkout mng
      uses: actions/checkout@v4
      with:
        repository: imbue-ai/mng
        ref: ${{ env.MNG_REF }}
        token: ${{ secrets.MNGR_ACCESS_TOKEN }}
        path: mng

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Install just
      uses: taiki-e/install-action@v2
      with:
        tool: just

    - name: Install uv (Python package manager)
      uses: astral-sh/setup-uv@v4

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: offload

    - name: Install offload (current version)
      working-directory: offload
      run: just install

    - name: Install mng dependencies
      working-directory: mng
      run: |
        uv venv .venv --clear
        uv sync --all-packages
        uv tool install -e libs/mng

    - name: Run integration test
      working-directory: mng
      env:
        MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
        MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      run: |
        source .venv/bin/activate
        LAST_COMMIT_SHA=${{MNG_REF}} just test-offload
