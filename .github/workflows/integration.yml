name: Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Reference of mngr to test against. Pinned to a commit where tests are expected to mostly pass.
  MNGR_REF: "97b1e1b493150c453ed7a4192568cea76e5593e2"

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout offload
      uses: actions/checkout@v6
      with:
        path: offload

    - name: Checkout mngr
      uses: actions/checkout@v6
      with:
        repository: imbue-ai/mngr
        ref: ${{ env.MNGR_REF }}
        token: ${{ secrets.MNGR_ACCESS_TOKEN }}
        path: mngr
        fetch-depth: 0

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Install just
      uses: taiki-e/install-action@v2
      with:
        tool: just

    - name: Install uv (Python package manager)
      uses: astral-sh/setup-uv@v7

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: offload

    - name: Install offload (current version)
      working-directory: offload
      run: just install

    - name: Install mngr dependencies
      working-directory: mngr
      run: |
        uv venv .venv --clear
        uv sync --all-packages
        uv tool install -e libs/mngr

    - name: Run integration test
      id: run-tests
      continue-on-error: true
      working-directory: mngr
      env:
        MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
        MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      run: |
        source .venv/bin/activate
        LAST_COMMIT_SHA=${{ env.MNGR_REF }} stdbuf -oL just test-offload -v 2>&1 | stdbuf -oL tee /tmp/test-output.log
        echo "EXIT_CODE=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

    - name: Validate test results
      run: |
        echo "=== Validating test output ==="
        # Check that "passed" appears in output (case-insensitive)
        if ! grep -qi "passed" /tmp/test-output.log; then
          echo "FAIL: output does not contain 'passed'"
          exit 1
        fi

        # Check that "failed" appears followed by a number < 10 (case-insensitive)
        FAILED_COUNT=$(grep -oiE 'failed[: ]*[0-9]+' /tmp/test-output.log | grep -oE '[0-9]+' | tail -1)
        if [ -z "$FAILED_COUNT" ]; then
          echo "FAIL: output does not contain 'failed' with a count"
          exit 1
        fi
        if [ "$FAILED_COUNT" -ge 10 ]; then
          echo "FAIL: failed count is $FAILED_COUNT (must be < 10)"
          exit 1
        fi
        echo "PASS: found 'passed' and failed count is $FAILED_COUNT (< 10)"
