# Offload configuration for running cargo tests on Modal
# Uses the simplified Modal provider

[offload]
max_parallel = 4
test_timeout_secs = 600
sandbox_repo_root = "/app"

[provider]
type = "modal"
dockerfile = ".devcontainer/Dockerfile"
include_cwd = true

[framework]
type = "nextest"
# test_id_format defaults to "{classname} {name}" for nextest

[groups.all]
retry_count = 1

[report]
output_dir = "test-results"
