# offload configuration for running cargo tests on Modal
# Uses the simplified Modal provider

test_id_format = "{classname} {name}"

[offload]
max_parallel = 4
test_timeout_secs = 600
stream_output = true
sandbox_project_root = "/app"

[provider]
type = "modal"
dockerfile = ".devcontainer/Dockerfile"
include_cwd = true

[groups.all]
type = "cargo"
retry_count = 1

[report]
output_dir = "test-results"
